<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Versões</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #ffffff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 400px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 5px;
      background-color: #555;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #333;
    }

    .version-list {
      margin-top: 20px;
      max-height: 200px;
      overflow-y: auto;
    }

    .version-item {
      background: #eee;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete-btn {
      background-color: #999;
      padding: 5px 8px;
      font-size: 12px;
    }

    .delete-btn:hover {
      background-color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Controle de Versões</h1>

    <input type="text" id="versionInput" placeholder="Digite a versão (ex: v1.0.0)">
    <button onclick="addVersion()">Adicionar Versão</button>

    <div class="version-list" id="versionList"></div>
  </div>

  <script>
    let versions = [];

    function addVersion() {
      const input = document.getElementById('versionInput');
      const value = input.value.trim();

      if (value === '') {
        alert('Digite uma versão válida!');
        return;
      }

      const version = {
        id: Date.now(),
        name: value,
        date: new Date().toLocaleString()
      };

      versions.push(version);
      input.value = '';
      renderVersions();
    }

    function deleteVersion(id) {
      versions = versions.filter(v => v.id !== id);
      renderVersions();
    }

    function renderVersions() {
      const list = document.getElementById('versionList');
      list.innerHTML = '';

      versions.forEach(v => {
        const div = document.createElement('div');
        div.className = 'version-item';

        div.innerHTML = `
          <div>
            <strong>${v.name}</strong><br>
            <small>${v.date}</small>
          </div>
          <button class="delete-btn" onclick="deleteVersion(${v.id})">X</button>
        `;

        list.appendChild(div);
      });
    }
  </script>
</body>
</html>
